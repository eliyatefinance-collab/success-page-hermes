<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Candlestick Guide</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;background:#0d1117;color:white;display:flex;align-items:center;justify-content:center;min-height:100vh}

        p{color:#8b949e;margin-bottom:24px;font-size:14px}

        input{width:100%;padding:12px;border:1px solid #30363d;background:#0d1117;color:white;border-radius:8px;margin-bottom:12px;font-size:14px}
        button{width:100%;padding:12px;border:none;border-radius:8px;background:#f0c040;color:#0d1117;font-size:16px;font-weight:bold;cursor:pointer}
        .footer{margin-top:20px;font-size:12px;color:#484f58}

</head>
<body>
    <div class="card">
        <h1>Free Candlestick Guide</h1>
        <p>Get the PDF guide with Doji, Hammer, Engulfing patterns explained.</p>
        <div class="price">FREE</div>
        <form action="https://adopted-creativity-varied-satellite.trycloudflare.com/signup" method="POST">
            <input type="text" name="name" placeholder="First name" required>
            <input type="email" name="email" placeholder="Email address" required>
